name: Release

on:
  push:
    tags:
      - "[0-9]+\\.[0-9]+\\.[0-9]+"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
    outputs:
      release_id: ${{ steps.create_draft.outputs.release_id }}
      apk_sha256: ${{ steps.apk.outputs.apk_sha256 }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Guard against pre-existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          if ! LOOKUP_JSON=$(gh api graphql \
            -F owner="$OWNER" \
            -F name="$REPO" \
            -F tagName="$GITHUB_REF_NAME" \
            -f query='query($owner: String!, $name: String!, $tagName: String!) {
              repository(owner: $owner, name: $name) {
                release(tagName: $tagName) { databaseId isDraft }
              }
            }'); then
            echo "::error::Could not check for a pre-existing release for $GITHUB_REF_NAME"
            exit 1
          fi
          if ! printf '%s' "$LOOKUP_JSON" | jq -e '
            .errors == null and
            (.data.repository | type == "object") and
            (.data.repository | has("release")) and
            (.data.repository.release == null or
              (.data.repository.release.databaseId | type == "number") and
              (.data.repository.release.isDraft | type == "boolean"))
          ' >/dev/null; then
            echo "::error::Invalid response while checking for a pre-existing release for $GITHUB_REF_NAME"
            exit 1
          fi
          EXISTING_JSON=$(printf '%s' "$LOOKUP_JSON" | jq -c .data.repository.release)
          if [ "$EXISTING_JSON" != "null" ]; then
            EXISTING_ID=$(printf '%s' "$EXISTING_JSON" | jq -r .databaseId)
            IS_DRAFT=$(printf '%s' "$EXISTING_JSON" | jq -r .isDraft)
            if [ "$IS_DRAFT" = "true" ]; then
              echo "Deleting stale draft release $EXISTING_ID for $GITHUB_REF_NAME"
              gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/$EXISTING_ID"
            else
              echo "::error::A published release for tag $GITHUB_REF_NAME already exists. Aborting to avoid a duplicate release."
              exit 1
            fi
          else
            echo "No pre-existing release for $GITHUB_REF_NAME"
          fi
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version-file: .java-version
      - uses: gradle/actions/setup-gradle@v6
      - name: Decode keystore
        if: env.HAS_KEYSTORE == 'true'
        run: |
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ] || [ -z "${{ secrets.KEY_ALIAS }}" ] || [ -z "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "::error::KEYSTORE_BASE64 is set but one of KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD is missing."
            exit 1
          fi
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/keystore.jks"
          {
            echo "VELES_KEYSTORE_FILE=$RUNNER_TEMP/keystore.jks"
            echo "VELES_KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "VELES_KEY_ALIAS=${{ secrets.KEY_ALIAS }}"
            echo "VELES_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"
          } >> "$GITHUB_ENV"
      - run: ./gradlew assembleRelease
      - name: Verify built version matches tag
        run: |
          BUILT_NAME=$(./gradlew -q :app:androidGitVersion | awk -F'\t' '/androidGitVersion.name/ {print $2}')
          if [ "$BUILT_NAME" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Built versionName '$BUILT_NAME' does not match tag '$GITHUB_REF_NAME'. The androidgitversion plugin may not see the tag (shallow checkout?)."
            exit 1
          fi
          echo "Version match OK: $BUILT_NAME"
      - name: Collect artifacts and checksums
        id: apk
        run: |
          if [ "$HAS_KEYSTORE" = "true" ]; then
            cp app/build/outputs/apk/release/app-release.apk "veles-$GITHUB_REF_NAME.apk"
            echo "suffix=" >> "$GITHUB_OUTPUT"
          else
            cp app/build/outputs/apk/release/app-release-unsigned.apk "veles-$GITHUB_REF_NAME.apk"
            echo "suffix= (unsigned)" >> "$GITHUB_OUTPUT"
          fi
          cp app/build/outputs/mapping/release/mapping.txt mapping.txt
          APK_SHA256=$(sha256sum "veles-$GITHUB_REF_NAME.apk" | awk '{print $1}')
          echo "apk_sha256=$APK_SHA256" >> "$GITHUB_OUTPUT"
          sha256sum "veles-$GITHUB_REF_NAME.apk" mapping.txt > SHA256SUMS
          cat SHA256SUMS
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            veles-${{ github.ref_name }}.apk
            mapping.txt
      - name: Upload APK for the verify job
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: veles-${{ github.ref_name }}.apk
          if-no-files-found: error
      - name: Create draft GitHub Release
        id: create_draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "veles-$GITHUB_REF_NAME.apk" \
            mapping.txt \
            SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --title "Veles $GITHUB_REF_NAME${{ steps.apk.outputs.suffix }}" \
            --draft \
            --generate-notes
          # gh release view is draft-aware (scans release list for drafts,
          # unlike the REST tags endpoint which only finds published releases).
          RELEASE_ID=$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json databaseId -q .databaseId)
          [ -n "$RELEASE_ID" ] || { echo "::error::Could not resolve draft release ID for $GITHUB_REF_NAME"; exit 1; }
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "Created draft release ID: $RELEASE_ID"
      - name: Append verification instructions to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_ID="${{ steps.create_draft.outputs.release_id }}"
          {
            gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" --jq '.body'
            echo
            echo "## Verify this download"
            echo
            echo "One-liner (trusts GitHub):"
            echo '```'
            echo "gh attestation verify veles-$GITHUB_REF_NAME.apk --repo $GITHUB_REPOSITORY"
            echo '```'
            echo "Zero-trust rebuild (needs only Docker; run from a checkout of tag $GITHUB_REF_NAME):"
            echo '```'
            echo "verify/verify.sh veles-$GITHUB_REF_NAME.apk $GITHUB_REF_NAME"
            echo '```'
            echo "Details: docs/reproducible-builds.md in this repo."
          } > notes.md
          NOTES="$(cat notes.md)"
          gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -f tag_name="$GITHUB_REF_NAME" \
            -f body="$NOTES"

  verify:
    name: verify reproducibility
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Default checkout of the tag ref — brings the TAG'S OWN verify/ toolkit and pins.
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with:
          name: release-apk
      - name: Rebuild from source and compare
        run: |
          VELES_REPO_URL="https://github.com/$GITHUB_REPOSITORY" \
            verify/verify.sh "veles-$GITHUB_REF_NAME.apk" "$GITHUB_REF_NAME"

  publish:
    name: publish
    needs: [build, verify]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_ID: ${{ needs.build.outputs.release_id }}
      EXPECTED_SHA256: ${{ needs.build.outputs.apk_sha256 }}
    steps:
      - name: Verify draft asset matches build digest, then publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Download the draft release's APK asset and compare its sha256
          # against the digest computed by the build job. This closes the
          # artifact-vs-asset gap before making the release public.
          #
          # We fetch the asset by release ID, not by tag: the release is
          # still a draft at this point, and draft releases are not
          # addressable by their tag via GET /releases/tags/{tag} (they
          # carry a synthetic "untagged-..." tag_name until published).
          # gh release download <tag> has no draft fallback, so it 404s.
          # The build job already passed us RELEASE_ID, which is the
          # unambiguous handle for the draft.
          APK_ASSET_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            --jq '.assets[] | select(.name == "veles-'"$GITHUB_REF_NAME"'.apk") | .id')
          [ -n "$APK_ASSET_ID" ] || { echo "::error::Could not find veles-$GITHUB_REF_NAME.apk on draft release $RELEASE_ID"; exit 1; }
          mkdir -p "$RUNNER_TEMP/draft-check"
          gh api "repos/$GITHUB_REPOSITORY/releases/assets/$APK_ASSET_ID" \
            -H "Accept: application/octet-stream" \
            > "$RUNNER_TEMP/draft-check/veles-$GITHUB_REF_NAME.apk"
          DRAFT_SHA256=$(sha256sum "$RUNNER_TEMP/draft-check/veles-$GITHUB_REF_NAME.apk" | awk '{print $1}')
          if [ "$DRAFT_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "::error::Draft asset sha256 ($DRAFT_SHA256) does not match build digest ($EXPECTED_SHA256). Aborting publish."
            exit 1
          fi
          echo "Draft asset sha256 matches build digest: $DRAFT_SHA256"
          # Publish by release ID (unambiguous), while explicitly replacing
          # GitHub's synthetic draft tag with the triggering version tag.
          # -F (not -f) coerces draft to a JSON boolean.
          gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -f tag_name="$GITHUB_REF_NAME" \
            -F draft=false
          PUBLISHED_TAG=$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" --jq .tag_name)
          if [ "$PUBLISHED_TAG" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Release published on '$PUBLISHED_TAG' instead of '$GITHUB_REF_NAME'"
            exit 1
          fi
          echo "Published release $GITHUB_REF_NAME (ID: $RELEASE_ID)"
