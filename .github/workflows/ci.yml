name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-check:
    name: lint-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew spotlessCheck
      - run: ./gradlew detekt
      - name: Guard against raw android.util.Log usage outside LogSink.kt
        run: |
          fail=0
          # Catch fully-qualified references and wildcard imports of android.util.Log
          if grep -rn "android.util.Log\|import android.util\.\*" app/src/main --include=*.kt | grep -v "LogSink.kt"; then
            echo "::error::Raw android.util.Log usage or wildcard import found outside LogSink.kt. Use VelesLog instead."
            fail=1
          fi
          # Catch bare Log.d/w/e/i/v calls (reachable via wildcard import) outside LogSink.kt
          if grep -rnE "Log\.[dweiv]\(" app/src/main --include=*.kt | grep -v "LogSink.kt"; then
            echo "::error::Bare Log.d/w/e/i/v call found outside LogSink.kt. Use VelesLog instead."
            fail=1
          fi
          exit $fail
      - run: ./gradlew lintDebug

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew testDebugUnitTest
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-test-results
          path: app/build/test-results/
          if-no-files-found: ignore

  instrumented-tests:
    name: instrumented-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo udevadm settle
          ls -l /dev/kvm
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: instrumented-test-results
          path: app/build/outputs/androidTest-results/
          if-no-files-found: ignore

  release-build:
    name: release-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew assembleRelease
      - uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: error
